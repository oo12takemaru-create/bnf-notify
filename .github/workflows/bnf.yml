name: BNF Daily Notify

on:
  schedule:
    # 23:30 UTC = 翌日 08:30 JST
    # 曜日 0=日曜〜4=木曜 → JSTの月〜金の朝
    - cron: '30 23 * * 0-4'
  # GitHub画面から手動実行も可能
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BNF notify
        env:
          TZ: Asia/Tokyo
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: python bnf_notify.py
